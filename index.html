document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1;cursor:pointer;background:{{ j.bg }};color:{{ j.color }};border:1px solid {{ j.border }};border-radius:11px;padding:13px 8px;font-family:Archivo,sans-serif;text-align:center\">\n              <div style=\"font-family:Oswald,sans-serif;font-weight:600;font-size:18px;letter-spacing:0.5px\">{{ j.label }}<\u002Fdiv>\n              <div style=\"font-size:10px;letter-spacing:1px;font-weight:600;margin-top:2px;opacity:0.75\">{{ j.sub }} JUGADOS<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#767163;margin:16px 4px;line-height:1.5\">Escribe el marcador final de cada partido. Los puntos de los <strong>{{ playerCount }} participantes<\u002Fstrong> se recalculan al instante y se guardan en este dispositivo. Deja un partido en blanco si aún no se juega.<\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:11px\">\n          <sc-for list=\"{{ mdMatches }}\" as=\"m\" hint-placeholder-count=\"24\">\n            <div style=\"background:#fff;border-radius:12px;padding:14px 16px 13px;box-shadow:0 2px 12px rgba(0,0,0,0.05);border-left:{{ m.cardBorder }}\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:11px\">\n                <div style=\"font-size:10px;letter-spacing:1.5px;color:#b0a99c;font-weight:700\">PARTIDO {{ m.num }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <span style=\"font-size:9.5px;letter-spacing:1.3px;font-weight:700;padding:4px 9px;border-radius:20px;background:{{ m.statusBg }};color:{{ m.statusColor }}\">{{ m.statusLabel }}<\u002Fspan>\n                  <button onclick=\"{{ m.onClear }}\" style=\"background:none;border:none;cursor:pointer;font-size:11px;color:#b0a99c;font-weight:600;padding:2px 4px\">Limpiar<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"flex:1;text-align:right;font-size:13.5px;font-weight:700;letter-spacing:0.4px\">{{ m.teamA }}<\u002Fdiv>\n                <input type=\"number\" inputmode=\"numeric\" min=\"0\" value=\"{{ m.valA }}\" onchange=\"{{ m.onA }}\" style=\"width:50px;height:48px;text-align:center;font-family:Oswald,sans-serif;font-size:23px;font-weight:600;border:1.5px solid rgba(20,19,14,0.16);border-radius:9px;background:#faf7f0;color:#14130e;outline:none\">\n                <div style=\"color:#cfc8ba;font-weight:600;font-size:14px\">–<\u002Fdiv>\n                <input type=\"number\" inputmode=\"numeric\" min=\"0\" value=\"{{ m.valB }}\" onchange=\"{{ m.onB }}\" style=\"width:50px;height:48px;text-align:center;font-family:Oswald,sans-serif;font-size:23px;font-weight:600;border:1.5px solid rgba(20,19,14,0.16);border-radius:9px;background:#faf7f0;color:#14130e;outline:none\">\n                <div style=\"flex:1;text-align:left;font-size:13.5px;font-weight:700;letter-spacing:0.4px\">{{ m.teamB }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ m.isFinal }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:11px;padding-top:10px;border-top:1px solid rgba(20,19,14,0.07);display:flex;gap:18px;font-size:11px;font-weight:600\">\n                  <div style=\"color:#1f7a4d\">{{ m.exactCount }} acertaron el marcador exacto<\u002Fdiv>\n                  <div style=\"color:#c8992c\">{{ m.resultCount }} acertaron el resultado<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const data = (typeof window!=='undefined' && window.POOL_DATA) || {matches:[],players:[],scoring:{exact:3,result:1}};\n    const seed = {};\n    data.matches.forEach(m=>{ if(m.actualA!=null && m.actualB!=null) seed[m.i]=[m.actualA,m.actualB]; });\n    let stored = {}, times = {};\n    try { stored = JSON.parse(localStorage.getItem('wc26_results')||'{}'); } catch(e){}\n    try { times = JSON.parse(localStorage.getItem('wc26_times')||'{}'); } catch(e){}\n    const merged = Object.assign({}, seed, stored);\n    const isDone = i => merged[i] && merged[i][0]!=null && merged[i][1]!=null;\n    let firstPending = data.matches.findIndex(m=> !isDone(m.i));\n    if(firstPending<0) firstPending = Math.max(0, data.matches.length-1);\n    this.state = { data, results: merged, times, view:'tabla', md:1, query:'', featuredIndex: firstPending };\n  }\n  save(results){ try{ localStorage.setItem('wc26_results', JSON.stringify(results)); }catch(e){} }\n  setScore(i, side, raw){\n    let v;\n    if(raw===''||raw==null) v=null;\n    else { v=parseInt(raw,10); if(isNaN(v)) v=null; else v=Math.max(0,Math.min(99,v)); }\n    const cur = this.state.results[i] ? this.state.results[i].slice() : [null,null];\n    cur[side]=v;\n    const results = Object.assign({}, this.state.results, {[i]:cur});\n    this.setState({results}); this.save(results);\n  }\n  clearScore(i){\n    const results = Object.assign({}, this.state.results, {[i]:null});\n    this.setState({results}); this.save(results);\n  }\n  setTime(i, val){\n    const times = Object.assign({}, this.state.times, {[i]:val});\n    this.setState({times}); try{ localStorage.setItem('wc26_times', JSON.stringify(times)); }catch(e){}\n  }\n  moveFeatured(d){\n    const len = this.state.data.matches.length;\n    let v = this.state.featuredIndex + d;\n    if(v<0) v=0; if(v>len-1) v=len-1;\n    this.setState({featuredIndex:v});\n  }\n  renderVals(){\n    const {data, results, times, query, view, md} = this.state;\n    const matches=data.matches, players=data.players;\n    const actualOf = i => { const r=results[i]; return (r && r[0]!=null && r[1]!=null) ? r : null; };\n    const sign = n => n>0?1:(n<0?-1:0);\n    const pointsFor = (pred, act) => {\n      if(!act || !pred || pred[0]==null || pred[1]==null) return 0;\n      if(pred[0]===act[0] && pred[1]===act[1]) return 3;\n      if(sign(pred[0]-pred[1])===sign(act[0]-act[1])) return 1;\n      return 0;\n    };\n    const fIdx = Math.max(0, Math.min(matches.length-1, this.state.featuredIndex));\n    const fmtPred = pr => (pr && pr[0]!=null && pr[1]!=null) ? (pr[0]+'-'+pr[1]) : '—';\n    const rows = players.map(p=>{\n      let pts=0,exact=0,result=0;\n      p.preds.forEach((pred,i)=>{ const a=actualOf(i); if(!a) return; const s=pointsFor(pred,a); if(s===3){exact++;pts+=3;} else if(s===1){result++;pts+=1;} });\n      return {name:p.name, pts, exact, result, fpred:p.preds[fIdx]};\n    });\n    rows.sort((a,b)=> b.pts-a.pts || b.exact-a.exact || b.result-a.result || a.name.localeCompare(b.name));\n    let lastKey=null,lastRank=0;\n    rows.forEach((r,idx)=>{ const key=r.pts+'_'+r.exact+'_'+r.result; if(key!==lastKey){lastRank=idx+1;lastKey=key;} r.rank=lastRank; });\n    const medal = rank => rank===1?{b:'#c8992c',t:'#14130e'}: rank===2?{b:'#a6a6a6',t:'#14130e'} : rank===3?{b:'#b97c46',t:'#ffffff'} : null;\n    const YOU = 'VALE Y GERMAN';\n    const q = (query||'').toLowerCase();\n    const standings = rows.filter(r=> !q || r.name.toLowerCase().indexOf(q)>-1).map(r=>{\n      const m=medal(r.rank); const you = r.name===YOU;\n      return { name:r.name, pts:r.pts, exact:r.exact, result:r.result, posLabel:String(r.rank),\n        discBg: you? '#c2362f' : (m? m.b : 'transparent'),\n        discColor: (you||m)? (you?'#fff':m.t) : '#767163',\n        discBorder: (you||m)? 'none' : '1px solid rgba(20,19,14,0.18)',\n        accentBorder: you? '4px solid #c2362f' : (m? ('4px solid '+m.b) : '4px solid transparent'),\n        rowBg: you? '#fbeae8' : 'transparent',\n        predLabel: fmtPred(r.fpred),\n        predColor: (r.fpred && r.fpred[0]!=null) ? '#0c3b2e' : '#c2bcae',\n        youChip: you? 'inline-block' : 'none' };\n    });\n    const topThree = rows.slice(0,3).map(r=>{ const m=medal(r.rank); return { rank:String(r.rank), name:r.name, pts:r.pts, accent:m.b, discBg:m.b, discColor:m.t }; });\n    const youIdx = rows.findIndex(r=>r.name===YOU);\n    const you = youIdx>-1 ? rows[youIdx] : null;\n    const played = matches.filter(m=> actualOf(m.i)).length;\n    const total = matches.length;\n\n    const fi = Math.max(0, Math.min(total-1, this.state.featuredIndex));\n    const fm = matches[fi] || {teamA:'',teamB:'',i:0};\n    const fr = results[fm.i];\n    const fAct = actualOf(fm.i);\n    let fex=0,fre=0;\n    if(fAct){ players.forEach(p=>{ const s=pointsFor(p.preds[fm.i],fAct); if(s===3)fex++; else if(s===1)fre++; }); }\n    const featured = {\n      teamA:fm.teamA, teamB:fm.teamB,\n      valA:(fr&&fr[0]!=null)?fr[0]:'', valB:(fr&&fr[1]!=null)?fr[1]:'',\n      time: times[fm.i]||'',\n      posLabel:'PARTIDO '+(fm.i+1)+' / '+total,\n      statusBg: fAct? 'rgba(34,150,90,0.22)' : 'rgba(239,68,68,0.18)',\n      statusColor: fAct? '#7fd6a4' : '#f4a8a3',\n      statusLine: fAct? ('FINAL · '+fex+' exactos · '+fre+' resultados') : 'Esperando marcador final',\n      onA: e=>this.setScore(fm.i,0,e.target.value),\n      onB: e=>this.setScore(fm.i,1,e.target.value),\n      onTime: e=>this.setTime(fm.i,e.target.value),\n      prev: ()=>this.moveFeatured(-1), next: ()=>this.moveFeatured(1)\n    };\n\n    const youPlayer = players.find(p=>p.name===YOU);\n    const yp = youPlayer ? youPlayer.preds[fm.i] : null;\n    let youPredText, youPredBg, youPredColor, youPredBorder;\n    if(yp && yp[0]!=null && yp[1]!=null){\n      youPredText = 'Tu pronóstico: '+fm.teamA+' '+yp[0]+' – '+yp[1]+' '+fm.teamB;\n      youPredBg = '#e7efe9'; youPredColor = '#0c3b2e'; youPredBorder = '1px solid rgba(31,122,77,0.28)';\n    } else {\n      youPredText = 'Sin pronóstico para este partido';\n      youPredBg = 'rgba(20,19,14,0.05)'; youPredColor = '#8a8478'; youPredBorder = '1px solid rgba(20,19,14,0.1)';\n    }\n\n    const mdMatches = matches.filter(m=>m.md===md).map(m=>{\n      const r=results[m.i];\n      const valA = (r&&r[0]!=null)? r[0] : '';\n      const valB = (r&&r[1]!=null)? r[1] : '';\n      const act = actualOf(m.i);\n      let ex=0,re=0;\n      if(act){ players.forEach(p=>{ const s=pointsFor(p.preds[m.i],act); if(s===3)ex++; else if(s===1)re++; }); }\n      return { teamA:m.teamA, teamB:m.teamB, valA, valB, num:m.i+1, isFinal:!!act,\n        statusLabel: act?'FINAL':'PENDIENTE',\n        statusBg: act?'#1f7a4d':'rgba(20,19,14,0.06)',\n        statusColor: act?'#ffffff':'#8a8478',\n        cardBorder: act?'4px solid #1f7a4d':'4px solid transparent',\n        exactCount:ex, resultCount:re,\n        onA: e=>this.setScore(m.i,0,e.target.value),\n        onB: e=>this.setScore(m.i,1,e.target.value),\n        onClear: ()=>this.clearScore(m.i) };\n    });\n    const mdDone = j => matches.filter(m=> m.md===j && actualOf(m.i)).length;\n    const jornadas = [1,2,3].map(j=>({ label:'JORNADA '+j, sub:mdDone(j)+'/24',\n      onClick: ()=>this.setState({md:j}),\n      bg: md===j?'#0c3b2e':'#ffffff', color: md===j?'#f6f1e7':'#767163',\n      border: md===j?'#0c3b2e':'rgba(20,19,14,0.15)' }));\n\n    return {\n      isTabla: view==='tabla', isMarcadores: view==='marcadores',\n      query, played, total, playerCount: players.length,\n      progressWidth: (total? (played/total*100):0)+'%',\n      tablaColor: view==='tabla'?'#f6f1e7':'rgba(246,241,231,0.45)',\n      tablaBorder: view==='tabla'?'3px solid #e7c25a':'3px solid transparent',\n      marcadoresColor: view==='marcadores'?'#f6f1e7':'rgba(246,241,231,0.45)',\n      marcadoresBorder: view==='marcadores'?'3px solid #e7c25a':'3px solid transparent',\n      featured, standings, topThree, mdMatches, jornadas,\n      hasYou: !!you,\n      youName: you? you.name : '',\n      fShort: 'PRON',\n      youRankLabel: you? ('#'+you.rank) : '',\n      youPts: you? you.pts : 0,\n      youExact: you? you.exact : 0,\n      youResult: you? you.result : 0,\n      youTotal: players.length,\n      youPredText: youPredText, youPredBg: youPredBg, youPredColor: youPredColor, youPredBorder: youPredBorder,\n      setTabla: ()=>this.setState({view:'tabla'}),\n      setMarcadores: ()=>this.setState({view:'marcadores'}),\n      onQuery: e=>this.setState({query:e.target.value})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
